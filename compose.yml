services:
  postgres:
    image: postgres:16
    container_name: instalike-postgres
    environment:
      POSTGRES_DB: instalike
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - instalike_postgres_data:/var/lib/postgresql/data

volumes:
  instalike_postgres_data: